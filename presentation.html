<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeGenix — Slide Overview</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg-light: 97%;
      --bg-color: hsl(210, 100%, 97%); /* Fixed premium light blue background */
      --text-color: #1e3a8a;
    }
    body {
      background: var(--bg-color);
      margin: 0;
      padding: 60px 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }
    #container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
    }
    .slide-outer {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 50px;
    }
    .slide-label {
      color: var(--text-color);
      font-weight: 700;
      margin-bottom: 20px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.9;
      transition: color 0.4s ease;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .download-btn {
      background: var(--text-color);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 11px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }
    .download-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .iframe-container {
      width: 1920px;
      height: 1080px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.2);
      background: #fff;
      border-radius: 0;
      overflow: hidden;
      transform-origin: top center;
      border: 1px solid rgba(0,0,0,0.05);
    }
    iframe {
      width: 1920px;
      height: 1080px;
      border: none;
    }

    /* Settings UI */
    #settings-toggle {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      z-index: 2000;
      font-size: 24px;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #settings-toggle:hover {
      transform: rotate(90deg) scale(1.1);
    }
    #settings-panel {
      position: fixed;
      bottom: 95px;
      right: 30px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      z-index: 2000;
      display: none;
      width: 280px;
      flex-direction: column;
      gap: 20px;
      border: 1px solid rgba(255,255,255,0.3);
      animation: slideIn 0.3s ease-out;
      font-family: inherit;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #settings-panel.open { display: flex; }
    
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: #1e3a8a;
      cursor: pointer;
      margin-top: -7px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .slide-outer.active {
      display: flex !important;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin-bottom: 0;
    }
    .slide-outer.active .slide-label {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(255,255,255,0.8);
      padding: 5px 15px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
    }
    #version-counter {
      position: absolute;
      top: 15px;
      right: 25px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-color);
      opacity: 0.4;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 1000;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="version-counter">v1.0.4</div>
  <div id="container"></div>

  <div id="settings-toggle" title="Display Settings">⚙️</div>
  <div id="settings-panel">
    <h3 style="margin:0 0 5px 0; font-size: 16px; color: #1e3a8a;">Display Settings</h3>
    <p style="margin:0 0 15px 0; font-size: 12px; opacity: 0.6;">Customize lobby view</p>
    
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <label style="font-size: 13px; font-weight: 600;">Background Lightness</label>
        <span id="lightness-val" style="font-size: 12px; opacity: 0.7;">97%</span>
      </div>
      <input type="range" id="bg-lightness" min="10" max="98" value="97">
    </div>

    <div style="height: 1px; background: #eee; margin: 5px 0;"></div>

    <div style="display: flex; align-items: center; justify-content: space-between;">
      <label for="auto-rotate-toggle" style="font-size: 13px; font-weight: 600; cursor: pointer;">Auto-Rotate Slides</label>
      <input type="checkbox" id="auto-rotate-toggle" style="width: 18px; height: 18px; cursor: pointer;">
    </div>
    <p style="margin: -10px 0 0 0; font-size: 11px; opacity: 0.5;">Rotates every 15 seconds</p>

  </div>
  <script>
    let currentBrandColor = '#1e3a8a';
    let currentLightness = '97%';


    function applyLightness(val) {
      currentLightness = val;
      document.querySelectorAll('iframe').forEach(ifr => {
        injectStylesIntoIframe(ifr);
      });
    }

    function injectStylesIntoIframe(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc || !doc.documentElement) return;
        const index = parseInt(iframe.dataset.index || 0);

        // Slides 30-34 (Exowell) should keep original colors
        if (index >= 29) {
          return;
        }

        const isDark = parseInt(currentLightness) < 50;
        
        // --- 1. DOM Manipulation (Logo Swapping) ---
        const logos = doc.querySelectorAll('.logo-img, .sp-logo img, .sp-logo-r img');
        logos.forEach(img => {
          const currentSrc = img.src;
          const decodedSrc = decodeURIComponent(currentSrc);
          
          if (!isDark) {
            // Light background -> Use black logo
            if (decodedSrc.includes('white logo')) {
              img.src = currentSrc.replace(/white(%20| )logo/i, 'black logo');
            }
          } else {
            // Dark background -> Use white logo
            if (decodedSrc.includes('black logo')) {
              img.src = currentSrc.replace(/black(%20| )logo/i, 'white logo');
            }
          }
        });

        // --- 2. Style Injection ---
        let styleEl = doc.getElementById('__branding_inject__');
        if (!styleEl) {
          styleEl = doc.createElement('style');
          styleEl.id = '__branding_inject__';
          doc.head.appendChild(styleEl);
        }
        
        let bgColor = `hsl(210, 20%, ${currentLightness})`;
        
        // On light backgrounds: Titles = Brand Color (Blue), Body = Dark Gray
        // On dark backgrounds: Everything = White/Off-white
        const titleColor = isDark ? '#ffffff' : currentBrandColor;
        const bodyColor = isDark ? 'rgba(255,255,255,0.85)' : '#1a1a1a';

        // Specific fix for Slide 28 right panel text (index 27)
        let s28Fix = '';
        if (index === 27) {
          s28Fix = `
            .sp-right-navy .sp-cat { color: var(--brand-color) !important; }
            .sp-right-navy .sp-ftag-title { color: var(--brand-color) !important; }
            .sp-right-navy .sp-ftag-desc { color: var(--body-color) !important; }
          `;
        }

        // Specific fix for Slides 13-15 contrast (indices 12, 13, 14)
        let contrastFix = '';
        if (index >= 12 && index <= 14) {
          contrastFix = `
            .left-panel { background: #ffffff !important; }
            .left-panel .challenge-label { 
              background: #0A1628 !important; 
              color: #ffffff !important; 
              display: inline-block !important;
              padding: 8px 24px !important;
              border-radius: 50px !important;
              font-size: 15px !important;
              font-weight: 800 !important;
              letter-spacing: 0.25em !important;
              margin-bottom: 30px !important;
            }
            .right-panel { background: #0A1628 !important; }
            .right-panel * { color: #ffffff !important; }
            .right-panel .solution-label { 
              background: var(--brand-color) !important;
              color: #ffffff !important; 
              display: inline-block !important;
              padding: 8px 24px !important;
              border-radius: 50px !important;
              font-size: 15px !important;
              font-weight: 800 !important;
              letter-spacing: 0.25em !important;
              margin-bottom: 30px !important;
            }
            .right-panel .em { color: #4C6EF5 !important; }
            .right-panel .cue-text { color: #4C6EF5 !important; }
            .right-panel .cue-dot { background: #4C6EF5 !important; }
          `;
        }

        // Specific fix for Slide 29 (index 28) to show full image
        let s29Fix = '';
        if (index === 28) {
          s29Fix = `
            .sp-photo-box { background: #ffffff !important; }
            .sp-photo-box img { object-fit: contain !important; }
          `;
        }

        styleEl.textContent = `
          :root { 
            --brand-color: ${currentBrandColor} !important; 
            --bg-light: ${currentLightness} !important;
            --bg-color: ${bgColor} !important;
            --title-color: ${titleColor} !important;
            --body-color: ${bodyColor} !important;
          }
          
          /* Background Overrides */
          body, .screen, .white, .navy, .dark-bg, .left-panel, .right-panel, .panel, 
          .sp-screen, .sp-left, .sp-right, .sp-right-navy, .sp-white {
            background: var(--bg-color) !important;
            background-color: var(--bg-color) !important;
          }
          
          /* Brand Accent Overrides */
          .top-bar, .divider, .bdot, .accent-line, .btn-primary, .progress-bar, .sp-top-bar, .sp-divider, .sp-divider-dark, .sp-pain-dot, .sp-step-num, .sp-cand-dot {
            background: var(--brand-color) !important;
            background-color: var(--brand-color) !important;
          }
          
          .em, .cat-label, .accent-text, .stat-label, a, .sp-em, .sp-cat, .sp-stat-val, .sp-step-title {
            color: var(--brand-color) !important;
          }
          
          .border-left-blue, .border-blue {
            border-left-color: var(--brand-color) !important;
            border-color: var(--brand-color) !important;
          }
          
          /* Text Refinements */
          .service-title-white, .service-title-dark, h1, h2, h3, .stat-value, .title, .subtitle, 
          .logo-text-white, .logo-text-dark, .quote-text, .attribution, .big-claim, 
          .challenge-title, .solution-title, .right-headline, .headline-white, .headline-blue, .pillar-val, .fact-val-white, .fact-val-dark,
          .sp-headline, .sp-headline-dark, .sp-logo-text, .sp-logo-text-dark, .sp-pain-title, .sp-benefit-val, .sp-benefit-label, .sp-stat-val, .sp-step-name, .sp-journey-title {
            color: var(--title-color) !important;
          }
          
          /* Separate athlete name/title so they can remain white over dark gradients even in light mode */
          .athlete-name { color: var(--title-color); }
          .athlete-title { color: var(--body-color); }

          .desc-light, .desc-dark, .btext-light, .btext-dark, .feature-desc, p, li, span, 
          .attribution-title, .subhead, .challenge-body, .solution-body, .right-body, 
          .pillar-label, .pillar-sub, .stat-label, .fact-label-white, .pillar-text, .fact-label, .panel-label,
          .sp-body, .sp-body-dark, .sp-pain-body, .sp-benefit-desc, .sp-cond-title, .sp-cond-desc, .sp-stat-lbl, .sp-step-body, .sp-step-bullet, .sp-ftag-desc, .sp-journey-body, .sp-cand-text {
            color: var(--body-color) !important;
          }
          
          .challenge-label, .solution-label {
            display: inline-block !important;
            font-size: 15px !important;
            font-weight: 800 !important;
            letter-spacing: 0.25em !important;
            text-transform: uppercase !important;
            padding: 8px 24px !important;
            border-radius: 50px !important;
            margin-bottom: 30px !important;
          }
          
          /* Challenge Label: Dark Background (Navy) for contrast on white left panel */
          .challenge-label {
            background: #0A1628 !important;
            color: #ffffff !important;
          }
          
          /* Solution Label: Brand Blue Background for contrast on dark right panel or light panel */
          .solution-label {
            background: var(--brand-color) !important;
            color: #ffffff !important;
          }
          
          /* Card-like elements (Pillars, Stat Boxes, Fact Cards, Photo Boxes) */
          .pillar, .stat-box, .joint-pill, .photo-box-navy, .fact-card-navy, .fact-card, 
          .photo-ph-navy, .fact-card-white, .photo-box-white, .photo-ph-white,
          .sp-benefit-card, .sp-photo-box, .sp-cond-card, .sp-stat-box, .sp-ftag, .sp-journey-card {
            border-color: ${isDark ? '#1A2F6E' : 'rgba(0,0,0,0.1)'} !important;
            background: ${isDark ? '#0A1628' : 'rgba(255,255,255,0.5)'} !important;
          }
          
          /* Make photo boxes 1:1 square aspect ratio - EXCLUDING full-height panels */
          .photo-box-navy:not([style*="height:100%"]):not([style*="height: 100%"]), 
          .photo-box-white:not([style*="height:100%"]):not([style*="height: 100%"]), 
          .photo-box:not([style*="height:100%"]):not([style*="height: 100%"]), 
          .photo-ph-navy:not([style*="height:100%"]):not([style*="height: 100%"]), 
          .photo-ph-white:not([style*="height:100%"]):not([style*="height: 100%"]), 
          .sp-photo-box:not([style*="height:100%"]):not([style*="height: 100%"]),
          .ex-photo-white:not([style*="height:100%"]):not([style*="height: 100%"]),
          .ex-photo-black:not([style*="height:100%"]):not([style*="height: 100%"]) {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 1 / 1 !important;
            max-height: 450px !important;
          }

          /* Significant vertical ratio for Exowell slides (30-34 / indices 29-33) */
          ${(index >= 29 && index <= 33) ? `
            .ex-photo-white, .ex-photo-black {
              height: 550px !important;
              width: 100% !important;
              min-height: 550px !important;
              max-height: 550px !important;
            }
            .ex-photo-white img, .ex-photo-black img {
              object-fit: cover !important;
              height: 100% !important;
              width: 100% !important;
            }
          ` : ''}
            margin-left: auto !important;
            margin-right: auto !important;
            overflow: hidden !important;
          }

          /* Catch-all for white text classes when background is light */
          ${!isDark ? `
            [class*="-light"], [class*="-white"], .text-white, .text-light, [class$="-white"] {
              color: var(--body-color) !important;
            }
          ` : ''}

          /* Disable specific gradients that might clash */
          .navy, .gradient-bg, .photo-box-navy, .left-panel, .right-panel, .sp-left, .sp-right { background-image: none !important; }
          
          ${s28Fix}
          ${s29Fix}
          ${contrastFix}
        `;
      } catch(e) { console.error("Style injection failed:", e); }
    }

    let SLIDES = [];

    let currentIndex = 0;
    let rotationInterval = null;
    const ROTATION_SPEED = 15000;

    function updateScale() {
      const scale = Math.min(1, (window.innerWidth - 100) / 1920);
      const containers = document.querySelectorAll('.iframe-container');
      containers.forEach(wrap => {
         wrap.style.transform = `scale(${scale})`;
         if (isAutoRotate()) {
           wrap.parentElement.style.height = '100vh';
         } else {
           wrap.parentElement.style.height = `${(1080 * scale) + 80}px`;
         }
      });
    }

    function isAutoRotate() {
      const toggle = document.getElementById('auto-rotate-toggle');
      return toggle ? toggle.checked : false;
    }

    function showSlide(index) {
      const slides = document.querySelectorAll('.slide-outer');
      if (slides.length === 0) return;
      
      currentIndex = (index + slides.length) % slides.length;
      
      slides.forEach((slide, i) => {
        if (isAutoRotate()) {
          slide.style.display = (i === currentIndex) ? 'flex' : 'none';
          slide.classList.toggle('active', i === currentIndex);
        } else {
          slide.style.display = 'flex';
          slide.classList.remove('active');
          slide.style.height = 'auto';
        }
      });
      
      if (isAutoRotate()) {
        window.scrollTo(0, 0);
        document.body.style.overflow = 'hidden';
      } else {
        document.body.style.overflow = 'auto';
      }
      updateScale();
    }

    function nextSlide() {
      showSlide(currentIndex + 1);
    }

    function startRotation() {
      stopRotation();
      if (isAutoRotate()) {
        rotationInterval = setInterval(nextSlide, ROTATION_SPEED);
      }
    }

    function stopRotation() {
      if (rotationInterval) {
        clearInterval(rotationInterval);
        rotationInterval = null;
      }
    }

    async function downloadSlidePNG(index, btnElement) {
      const originalText = btnElement.innerHTML;
      btnElement.innerHTML = 'Generating...';
      btnElement.disabled = true;
      
      try {
        const iframe = document.querySelector(`iframe[data-index="${index}"]`);
        if (!iframe || !iframe.contentDocument) throw new Error("Iframe not accessible");
        
        await new Promise(resolve => setTimeout(resolve, 300));
        
        const canvas = await html2canvas(iframe.contentDocument.body, {
          width: 1920,
          height: 1080,
          scale: 2, // 2x scale for high resolution (3840x2160)
          useCORS: true,
          logging: false
        });
        
        const link = document.createElement('a');
        link.download = `LifeGenix_Slide_${String(index + 1).padStart(2, '0')}_HiRes.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (err) {
        console.error(err);
        alert('Failed to generate PNG. Make sure you are running a local server to avoid CORS issues with images.');
      } finally {
        btnElement.innerHTML = originalText;
        btnElement.disabled = false;
      }
    }

    async function downloadSlidePDF(index, btnElement) {
      const originalText = btnElement.innerHTML;
      btnElement.innerHTML = 'Generating...';
      btnElement.disabled = true;
      
      try {
        const iframe = document.querySelector(`iframe[data-index="${index}"]`);
        if (!iframe || !iframe.contentDocument) throw new Error("Iframe not accessible");
        
        // Wait briefly to ensure rendering logic has completed if scrolling
        await new Promise(resolve => setTimeout(resolve, 300));
        
        const canvas = await html2canvas(iframe.contentDocument.body, {
          width: 1920,
          height: 1080,
          scale: 1,
          useCORS: true,
          logging: false
        });
        
        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: 'landscape',
          unit: 'px',
          format: [1920, 1080]
        });
        
        pdf.addImage(imgData, 'JPEG', 0, 0, 1920, 1080);
        pdf.save(`LifeGenix_Slide_${String(index + 1).padStart(2, '0')}.pdf`);
      } catch (err) {
        console.error(err);
        alert('Failed to generate PDF. Make sure you are running a local server to avoid CORS issues with images.');
      } finally {
        btnElement.innerHTML = originalText;
        btnElement.disabled = false;
      }
    }

    function render() {
      const container = document.getElementById('container');
      container.innerHTML = ''; 
      
      SLIDES.forEach((s, i) => {
        const outer = document.createElement('div');
        outer.className = 'slide-outer';
        
        const label = document.createElement('div');
        label.className = 'slide-label';
        
        const titleSpan = document.createElement('span');
        titleSpan.textContent = `Slide ${String(i + 1).padStart(2, '0')} — ${s.title}`;
        
        const dlBtn = document.createElement('button');
        dlBtn.className = 'download-btn';
        dlBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          PDF
        `;
        dlBtn.onclick = (e) => {
          e.stopPropagation();
          downloadSlidePDF(i, dlBtn);
        };
        
        const pngBtn = document.createElement('button');
        pngBtn.className = 'download-btn';
        pngBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          PNG
        `;
        pngBtn.onclick = (e) => {
          e.stopPropagation();
          downloadSlidePNG(i, pngBtn);
        };

        const btnContainer = document.createElement('div');
        btnContainer.style.display = 'flex';
        btnContainer.style.gap = '8px';
        btnContainer.appendChild(pngBtn);
        btnContainer.appendChild(dlBtn);
        
        label.appendChild(titleSpan);
        label.appendChild(btnContainer);
        
        const wrap = document.createElement('div');
        wrap.className = 'iframe-container';
        
        const f = document.createElement('iframe');
        f.srcdoc = s.srcdoc;
        f.dataset.index = i; // Store index for conditional styling
        
        // Inject initial styles when iframe loads
        f.onload = () => injectStylesIntoIframe(f);
        
        wrap.appendChild(f);
        outer.appendChild(label);
        outer.appendChild(wrap);
        container.appendChild(outer);
      });

      const toggle = document.getElementById('auto-rotate-toggle');
      if (toggle) {
        toggle.onchange = () => {
          if (toggle.checked) startRotation();
          else stopRotation();
          showSlide(currentIndex);
        };
      }

      const lightnessInput = document.getElementById('bg-lightness');
      const lightnessVal = document.getElementById('lightness-val');
      if (lightnessInput) {
        lightnessInput.oninput = () => {
          const val = lightnessInput.value + '%';
          lightnessVal.textContent = val;
          applyLightness(val);
        };
      }


      const settingsBtn = document.getElementById('settings-toggle');
      const panel = document.getElementById('settings-panel');
      if (settingsBtn && panel) {
        settingsBtn.onclick = (e) => {
          e.stopPropagation();
          panel.classList.toggle('open');
        };
        document.addEventListener('click', (e) => {
          if (!panel.contains(e.target) && e.target !== settingsBtn) {
            panel.classList.remove('open');
          }
        });
      }

      showSlide(0);
      if (isAutoRotate()) startRotation();
    }

    async function init() {
      const container = document.getElementById('container');
      container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#1e3a8a;font-family:Inter;font-size:24px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;">Loading Experience...</div>';
      
      try {
        const response = await fetch('slides.json');
        if (!response.ok) throw new Error('Network response was not ok');
        SLIDES = await response.json();
        
        const urlParams = new URLSearchParams(window.location.search);
        const catFilter = urlParams.get('cat');
        if (catFilter) {
          SLIDES = SLIDES.filter(s => s.cat === catFilter);
        }
        
        render();
      } catch (err) {
        console.error("Failed to load slides:", err);
        container.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#ff4444;font-family:Inter;padding:40px;text-align:center;">
          <h2 style="margin-bottom:20px;text-transform:uppercase;letter-spacing:0.1em;">Initialization Error</h2>
          <p style="color:#666;font-size:14px;max-width:400px;line-height:1.6;">The slide data could not be retrieved. Please ensure <code>slides.json</code> is present and served via a web server.</p>
          <button onclick="location.reload()" style="margin-top:30px;background:#1e3a8a;color:#fff;border:none;padding:12px 30px;border-radius:30px;cursor:pointer;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;box-shadow:0 10px 20px rgba(30,58,138,0.2);">Retry Connection</button>
        </div>`;
      }
    }
    window.onload = init;
    window.onresize = updateScale;
  </script>
</body>
</html>
